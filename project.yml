name: SwiftUIMacOSTerminalShellPickerDemo
options:
  bundleIdPrefix: com.freewind
  deploymentTarget:
    macOS: "14.0"
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    exactVersion: 1.10.1
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  SwiftUIMacOSTerminalShellPickerDemo:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freewind.SwiftUIMacOSTerminalShellPickerDemo
        INFOPLIST_FILE: Sources/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
